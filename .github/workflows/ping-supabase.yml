name: 🛡️ Warbound - Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 * * 1'
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  keep-alive:
    name: Ping Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pzglqzzamwbkrwckhynb.supabase.co/rest/v1/warbound_profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP Status: $STATUS"
          exit 0
