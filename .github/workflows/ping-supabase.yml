name: 🛡️ Warbound - Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 * * 1'
    - cron: '0 9 * * 4'
  workflow_dispatch:

jobs:
  keep-alive:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: 📡 Ping warbound_profiles table
        id: ping
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/warbound_profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Supabase aktif."
          else
            echo "❌ Gagal. Status: $HTTP_STATUS"
            exit 1
          fi

      - name: 📡 Ping warbound_characters table
        run: |
          curl -s -o /dev/null \
            "${{ secrets.SUPABASE_URL }}/rest/v1/warbound_characters?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
          echo "✅ Ping kedua selesai."

      - name: ✅ Laporan hasil
        if: always()
        run: |
          echo "Waktu: $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "Status: ${{ steps.ping.outputs.status }}"
